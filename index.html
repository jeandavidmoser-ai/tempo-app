<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEMPO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;color:#f0f0f0;font-family:sans-serif;font-size:14px}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 32px;border-bottom:1px solid #272727}
.logo{font-size:22px;font-weight:700;letter-spacing:0.14em}
.logo span{color:#C41E3A}
.usw{display:flex;gap:4px;background:#141414;border:1px solid #272727;padding:3px;border-radius:6px}
.usw button{background:none;border:none;color:#777;font-size:11px;padding:5px 14px;border-radius:4px;cursor:pointer}
.usw button.on{background:#C41E3A;color:#fff}
nav{display:flex;gap:2px;padding:0 32px;border-bottom:1px solid #272727;background:#0d0d0d}
nav button{background:none;border:none;border-bottom:2px solid transparent;color:#777;font-size:10px;padding:11px 14px;cursor:pointer;margin-bottom:-1px;text-transform:uppercase}
nav button.active{color:#f0f0f0;border-bottom-color:#C41E3A}
.page{display:none;max-width:1100px;margin:0 auto;padding:26px 24px}
.page.active{display:block}
.card{background:#141414;border:1px solid #272727;border-radius:8px;padding:20px;margin-bottom:18px}
</style>
</head>
<body>
<header>
<div class="logo">💀 TEMPO<span>.</span></div>
<div class="usw">
<button id="bu1" class="on" onclick="switchUser('toi')">TOI</button>
<button id="bu2" onclick="switchUser('elle')">ELLE</button>
</div>
</header>
<nav>
<button class="active" onclick="showPage('home')">Tableau de bord</button>
<button onclick="showPage('repertoire')">Répertoire</button>
<button onclick="showPage('planning')">Planning</button>
<button onclick="showPage('concerts')">Concerts</button>
</nav>
<div class="page active" id="page-home">
<div class="card">
<h2>Bienvenue sur TEMPO</h2>
<p>Version minimale fonctionnelle</p>
</div>
</div>
<div class="page" id="page-repertoire">
<div class="card">
<h2>Répertoire</h2>
<p>En construction</p>
</div>
</div>
<div class="page" id="page-planning">
<div class="card">
<h2>Planning</h2>
<p>En construction</p>
</div>
</div>
<div class="page" id="page-concerts">
<div class="card">
<h2>Concerts</h2>
<p>En construction</p>
</div>
</div>
<script>
function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
document.getElementById('page-'+id).classList.add('active');
const idx={home:0,repertoire:1,planning:2,concerts:3}[id];
document.querySelectorAll('nav button')[idx].classList.add('active');
}
function switchUser(u){
document.getElementById('bu1').className=u==='toi'?'on':'';
document.getElementById('bu2').className=u==='elle'?'on':'';
}
</script>
</body>
</html>
