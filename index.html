<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEMPO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--bg2:#141414;--bg3:#1c1c1c;--border:#272727;--red:#C41E3A;--pink:#E91E8C;--accent:#C41E3A;--text:#f0f0f0;--dim:#777;--muted:#444;--gold:#c8a84b}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid var(--border)}
.logo{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;letter-spacing:0.14em;cursor:pointer;user-select:none}
.logo span{color:var(--accent)}
.usw{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);padding:3px;border-radius:6px}
.usw button{background:none;border:none;color:var(--dim);font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:0.1em;padding:5px 14px;border-radius:4px;cursor:pointer;transition:all .15s}
.usw button.on{background:var(--accent);color:#fff}
nav{display:flex;gap:2px;padding:0 32px;border-bottom:1px solid var(--border);background:var(--bg)}
nav button{background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.15em;padding:11px 14px;cursor:pointer;transition:all .15s;margin-bottom:-1px;text-transform:uppercase}
nav button.active{color:var(--text);border-bottom-color:var(--accent)}
.page{display:none;max-width:1100px;margin:0 auto;padding:26px 24px}
.page.active{display:block}
.grid{display:grid;grid-template-columns:1fr 280px;gap:24px}
@media(max-width:768px){.grid{grid-template-columns:1fr}}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:18px}
.ch{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cl{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.18em;color:var(--dim);text-transform:uppercase}
.dot{width:6px;height:6px;background:var(--accent);border-radius:50%}
.lh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.st{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:0.15em;color:var(--dim);text-transform:uppercase}
.btn{font-family:'Oswald',sans-serif;letter-spacing:0.08em;border:none;border-radius:6px;cursor:pointer;transition:all .15s}
.br{background:var(--accent);color:#fff;padding:8px 16px;font-size:11px}
#sl{display:flex;flex-direction:column;gap:6px}
.si{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.si:hover{border-color:#3d3d3d;background:var(--bg3)}
.stt{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600}
.badge{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:0.1em;padding:3px 8px;border-radius:4px;text-transform:uppercase}
.bd0{background:rgba(100,100,100,.15);color:#666}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:flex-start;justify-content:center;padding:38px 16px}
.ov.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:100%;max-width:560px}
.mh{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mt{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600}
.mb{padding:20px 22px;display:flex;flex-direction:column;gap:13px}
.mfoot{padding:13px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:9px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
label{font-family:'Oswald',sans-serif;font-size:9px;color:var(--dim);text-transform:uppercase}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-family:inherit;font-size:13px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
</style>
</head>
<body>
<header>
<div class="logo" onclick="showPage('home')">💀 TEMPO<span>.</span></div>
<div class="usw">
<button id="bu1" class="on" onclick="switchUser('toi')">TOI</button>
<button id="bu2" onclick="switchUser('elle')">ELLE</button>
</div>
</header>
<nav>
<button class="active" onclick="showPage('home')">TABLEAU DE BORD</button>
<button onclick="showPage('repertoire')">RÉPERTOIRE</button>
<button onclick="showPage('planning')">PLANNING</button>
<button onclick="showPage('concerts')">CONCERTS</button>
</nav>
<div class="page active" id="page-home">
<div class="card">
<div class="ch"><span class="cl">Coach Tempo</span><div class="dot"></div></div>
<div style="padding:20px">Salut. Je suis prêt pour tes morceaux.</div>
</div>
</div>
<div class="page" id="page-repertoire">
<div class="lh">
<span class="st">Ton répertoire</span>
<button class="btn br" onclick="openModal('new')">+ AJOUTER</button>
</div>
<div id="sl"></div>
</div>
<div class="ov" id="ov">
<div class="modal">
<div class="mh"><span class="mt" id="mt">NOUVEAU MORCEAU</span><button onclick="closeModal()" style="background:none;border:none;color:var(--dim);cursor:pointer">✕</button></div>
<form id="sf" onsubmit="save(event)">
<input type="hidden" id="f-id">
<div class="mb">
<div class="fr2">
<div class="fg full"><label>Titre *</label><input type="text" id="f-titre" required></div>
<div class="fg"><label>Artiste</label><input type="text" id="f-artiste"></div>
<div class="fg"><label>Statut</label><select id="f-statut"><option value="en_cours">En cours</option><option value="acquis">Acquis</option></select></div>
</div>
</div>
<div class="mfoot">
<button type="button" class="btn br" style="background:none;border:1px solid var(--border);color:var(--dim)" onclick="closeModal()">ANNULER</button>
<button type="submit" class="btn br">SAUVEGARDER</button>
</div>
</form>
</div>
</div>
<script>
let songs=JSON.parse(localStorage.getItem('tempo-songs')||'[]');
let currentUser='toi';
function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
document.getElementById('page-'+id).classList.add('active');
const idx={home:0,repertoire:1,planning:2,concerts:3}[id];
document.querySelectorAll('nav button')[idx].classList.add('active');
if(id==='repertoire')render();
}
function switchUser(u){
currentUser=u;
document.getElementById('bu1').className=u==='toi'?'on':'';
document.getElementById('bu2').className=u==='elle'?'on':'';
document.documentElement.style.setProperty('--accent',u==='elle'?'#E91E8C':'#C41E3A');
document.querySelector('.logo').innerHTML=(u==='elle'?'🌸':'💀')+' TEMPO<span>.</span>';
}
function render(){
const list=document.getElementById('sl');
list.innerHTML=songs.map(s=>`<div class="si" onclick="openModal('${s.id}')"><div><div class="stt">${s.titre}</div><div class="sm">${s.artiste||''}</div></div><span class="badge bd0">${s.statut}</span></div>`).join('')||'<div class="card" style="padding:20px;text-align:center">Aucun morceau</div>';
}
function openModal(id){
document.getElementById('ov').classList.add('open');
if(id==='new'){document.getElementById('f-id').value='';document.getElementById('sf').reset();}
else{const s=songs.find(x=>x.id===id);document.getElementById('f-id').value=s.id;document.getElementById('f-titre').value=s.titre;document.getElementById('f-artiste').value=s.artiste;document.getElementById('f-statut').value=s.statut;}
}
function closeModal(){document.getElementById('ov').classList.remove('open');}
function save(e){
e.preventDefault();
const id=document.getElementById('f-id').value||Date.now().toString();
const song={id,titre:document.getElementById('f-titre').value,artiste:document.getElementById('f-artiste').value,statut:document.getElementById('f-statut').value};
const idx=songs.findIndex(s=>s.id===id);
if(idx>-1)songs[idx]=song;else songs.push(song);
localStorage.setItem('tempo-songs',JSON.stringify(songs));
closeModal();render();
}
</script>
</body>
</html>
